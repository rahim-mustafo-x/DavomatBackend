# ===============================
# Spring Boot Application
# ===============================
spring.application.name=DavomatBackend
server.port=8080
spring.main.allow-circular-references=true

# ===============================
# Datasource (PostgreSQL)
# ===============================
# DB_URL ni .env da belgilang:
#   Tashqi server: jdbc:postgresql://192.168.1.150:5432/davomat_db
#   Docker ichida: jdbc:postgresql://postgres:5432/davomat_db
#   Local dev:     jdbc:postgresql://localhost:5432/davomat_db
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/davomat_db}
spring.datasource.username=${DB_USERNAME:davomat_user}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=true

# ===============================
# Hibernate / JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.open-in-view=false

# ===============================
# Logging
# ===============================
logging.level.uz.coder.davomatbackend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.org.springdoc.core.utils.SpringDocAnnotationsUtils=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/davomat-app.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=100MB

# ===============================
# Static Resources
# ===============================
# Production (Docker): /app/static/ dan o'qiladi
# Development: frontend/dist/ dan o'qiladi
spring.web.resources.static-locations=classpath:/static/,file:/app/static/,file:./frontend/dist/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true

# ===============================
# Email Configuration
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**,/auth/**

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:my-super-secret-key-my-super-secret-key-my-super-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:2592000000}